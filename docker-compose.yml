version: '3.8'

services:
  #---------------------------------------------------------
  # Сервис 1: ML-сервис (Flask + модель)
  #---------------------------------------------------------
  ml-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: credit-ml-service
    ports:
      - "5000:5000"
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  #---------------------------------------------------------
  # Сервис 2: Nginx — имитация системы мониторинга
  #---------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: credit-monitoring
    ports:
      - "8080:80"
    volumes:
      - ./logs:/usr/share/nginx/html/logs:ro
    depends_on:
      - ml-service
    restart: unless-stopped